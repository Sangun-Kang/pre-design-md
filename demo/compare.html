<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>pre-design-md demo comparison</title>
    <meta
      name="description"
      content="Side-by-side comparison of Codex and Claude demo pages."
    >
    <style>
      :root {
        /* Mirrors src/styles/base.css --app-* tokens so the demo scaffolding
           looks like the wizard chrome. */
        --bg: oklch(99% 0 0);
        --surface: oklch(100% 0 0);
        --surface-raised: oklch(100% 0 0);
        --surface-sunken: oklch(97% 0 0);
        --border: oklch(92% 0 0);
        --border-strong: oklch(85% 0 0);
        --text: oklch(18% 0 0);
        --text-muted: oklch(48% 0 0);
        --text-subtle: oklch(62% 0 0);
        --accent: oklch(20% 0 0);
        --radius-sm: 0.375rem;
        --radius-md: 0.625rem;
        --shadow-sm: 0 1px 2px 0 oklch(0% 0 0 / 0.05);
        --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        color-scheme: light;
        font-family: var(--font-sans);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: inherit;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .bar {
        height: 56px;
        display: flex;
        align-items: center;
        gap: 1.5rem;
        padding: 0.75rem 1.25rem;
        background: color-mix(in oklch, var(--bg) 88%, transparent);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        position: sticky;
        top: 0;
        z-index: 2;
      }

      .brand {
        display: inline-flex;
        align-items: baseline;
        gap: 0.5rem;
        font-family: var(--font-mono);
        font-weight: 600;
        font-size: 0.875rem;
        letter-spacing: -0.01em;
        color: var(--text);
        white-space: nowrap;
      }

      .brand-summary {
        font-family: var(--font-mono);
        font-size: 0.7rem;
        font-weight: 500;
        color: var(--text-subtle);
        letter-spacing: 0;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex: 1;
        justify-content: center;
        flex-wrap: wrap;
      }

      .toggle {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }

      .toggle-label {
        font-family: var(--font-mono);
        font-size: 0.6875rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-subtle);
      }

      .toggle-group {
        display: inline-flex;
        gap: 0;
        padding: 2px;
        background: var(--surface-sunken);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
      }

      .toggle-btn {
        padding: 0.3125rem 0.625rem;
        background: transparent;
        color: var(--text-muted);
        font-family: var(--font-sans);
        font-size: 0.75rem;
        font-weight: 500;
        line-height: 1.2;
        border: none;
        border-radius: calc(var(--radius-md) - 2px);
        cursor: pointer;
        transition: background 0.15s ease, color 0.15s ease;
      }

      .toggle-btn:hover {
        color: var(--text);
      }

      .toggle-btn.is-active {
        background: var(--surface);
        color: var(--text);
        font-weight: 600;
        box-shadow: var(--shadow-sm);
      }

      .links {
        display: flex;
        align-items: center;
        gap: 0.25rem;
      }

      .link {
        display: inline-flex;
        align-items: center;
        gap: 0.375rem;
        padding: 0.4375rem 0.75rem;
        font-family: var(--font-sans);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--text-muted);
        background: transparent;
        border: 1px solid transparent;
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      }

      .link:hover {
        background: var(--surface-raised);
        color: var(--text);
        border-color: var(--border);
      }

      .link--app {
        color: var(--text);
      }

      .frames {
        height: calc(100% - 56px);
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1px;
        background: var(--border);
      }

      .panel {
        min-width: 0;
        display: grid;
        grid-template-rows: 36px minmax(0, 1fr);
        background: var(--surface);
      }

      .panel-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0 0.75rem;
        border-bottom: 1px solid var(--border);
        background: var(--surface-sunken);
        color: var(--text-subtle);
        font-family: var(--font-mono);
        font-size: 0.6875rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .panel-title a {
        color: var(--text-muted);
        font-family: var(--font-sans);
        font-size: 0.75rem;
        font-weight: 500;
        text-transform: none;
        letter-spacing: 0;
      }

      .panel-title a:hover {
        color: var(--text);
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: white;
      }

      @media (max-width: 900px) {
        body {
          overflow: auto;
          padding-bottom: calc(6rem + env(safe-area-inset-bottom));
        }

        .bar {
          height: 56px;
          display: flex;
          align-items: center;
          gap: 0.5rem;
          padding: 0.625rem 0.875rem;
          backdrop-filter: none;
          -webkit-backdrop-filter: none;
        }

        .brand {
          min-width: 0;
          margin-right: auto;
        }

        .brand-summary {
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .controls {
          position: fixed;
          left: max(0.75rem, env(safe-area-inset-left));
          right: max(0.75rem, env(safe-area-inset-right));
          top: auto;
          bottom: max(0.75rem, env(safe-area-inset-bottom));
          z-index: 20;
          display: grid;
          grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
          gap: 0.5rem;
          padding: 0.5rem;
          border: 1px solid var(--border);
          border-radius: calc(var(--radius-md) + 0.375rem);
          background: color-mix(in oklch, var(--bg) 90%, transparent);
          box-shadow: 0 16px 32px -8px oklch(0% 0 0 / 0.16), 0 6px 12px -6px oklch(0% 0 0 / 0.1);
          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
          flex: none;
          justify-content: stretch;
        }

        .toggle {
          display: grid;
          grid-template-rows: auto minmax(0, 1fr);
          gap: 0.25rem;
          min-width: 0;
        }

        .toggle-label {
          font-size: 0.625rem;
          letter-spacing: 0.08em;
        }

        .toggle-group {
          width: 100%;
          min-width: 0;
        }

        .toggle-btn {
          flex: 1;
          min-width: 0;
          padding-inline: 0.5rem;
          white-space: nowrap;
        }

        .links {
          justify-self: end;
        }

        .links .link:not(.link--app) {
          display: none;
        }

        .frames {
          height: auto;
          grid-template-columns: 1fr;
        }

        .panel {
          height: 80vh;
        }
      }

      @media (max-width: 560px) {
        body {
          padding-bottom: calc(8.25rem + env(safe-area-inset-bottom));
        }

        .controls {
          grid-template-columns: 1fr;
          gap: 0.45rem;
        }

        .toggle {
          grid-template-columns: 4.25rem minmax(0, 1fr);
          grid-template-rows: auto;
          align-items: center;
        }

        .brand-summary {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <header class="bar">
      <a class="brand" href="./">
        <span>pre-design-md</span>
        <span class="brand-summary">demos</span>
      </a>

      <div class="controls">
        <div class="toggle" role="group" aria-label="Project">
          <span class="toggle-label">Project</span>
          <div class="toggle-group" data-toggle="project">
            <button type="button" class="toggle-btn is-active" data-value="kelvin">Kelvin</button>
            <button type="button" class="toggle-btn" data-value="halftone">Halftone</button>
          </div>
        </div>

        <div class="toggle" role="group" aria-label="Agent">
          <span class="toggle-label">Agent</span>
          <div class="toggle-group" data-toggle="agent">
            <button type="button" class="toggle-btn is-active" data-value="claude">Claude</button>
            <button type="button" class="toggle-btn" data-value="codex">Codex</button>
          </div>
        </div>
      </div>

      <nav class="links" aria-label="Comparison links">
        <a class="link link--app" href="../">App ↗</a>
      </nav>
    </header>

    <main class="frames">
      <section class="panel" aria-label="Google DESIGN.md demo">
        <div class="panel-title">
          <span>Google DESIGN.md</span>
          <a id="google-open" href="claude/kelvin-google.html">Open full page ↗</a>
        </div>
        <iframe id="google-frame" title="Google DESIGN.md demo" src="claude/kelvin-google.html?embed=1"></iframe>
      </section>

      <section class="panel" aria-label="Rich Prompt demo">
        <div class="panel-title">
          <span>Rich Prompt</span>
          <a id="rich-open" href="claude/kelvin-rich.html">Open full page ↗</a>
        </div>
        <iframe id="rich-frame" title="Rich Prompt demo" src="claude/kelvin-rich.html?embed=1"></iframe>
      </section>
    </main>

    <script>
      const labels = {
        kelvin: 'Kelvin',
        halftone: 'Halftone',
        codex: 'Codex',
        claude: 'Claude',
      };

      const state = {
        project: 'kelvin',
        agent: 'claude',
      };

      const groups = document.querySelectorAll('[data-toggle]');
      const summary = document.querySelector('#summary');
      const richFrame = document.querySelector('#rich-frame');
      const googleFrame = document.querySelector('#google-frame');
      const richOpen = document.querySelector('#rich-open');
      const googleOpen = document.querySelector('#google-open');

      const params = new URLSearchParams(window.location.search);
      if (params.get('project') === 'halftone') state.project = 'halftone';
      if (params.get('agent') === 'codex') state.agent = 'codex';

      function syncActive() {
        groups.forEach((group) => {
          const key = group.dataset.toggle;
          group.querySelectorAll('.toggle-btn').forEach((btn) => {
            btn.classList.toggle('is-active', btn.dataset.value === state[key]);
          });
        });
      }

      function path(spec) {
        return `${state.agent}/${state.project}-${spec}.html`;
      }

      function update() {
        syncActive();

        const rich = path('rich');
        const google = path('google');
        richFrame.src = `${rich}?embed=1`;
        googleFrame.src = `${google}?embed=1`;
        richOpen.href = rich;
        googleOpen.href = google;
        if (summary) summary.textContent = `${labels[state.project]} · ${labels[state.agent]}`;

        const next = new URLSearchParams({
          project: state.project,
          agent: state.agent,
        });
        window.history.replaceState(null, '', `?${next.toString()}`);
      }

      groups.forEach((group) => {
        group.addEventListener('click', (event) => {
          const target = event.target.closest('.toggle-btn');
          if (!target) return;
          const key = group.dataset.toggle;
          const value = target.dataset.value;
          if (state[key] === value) return;
          state[key] = value;
          update();
        });
      });

      update();
    </script>
    <script src="./i18n.js"></script>
  </body>
</html>
